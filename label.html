
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAC Label Print</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f0f0;
    font-family: 'Arial', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    gap: 20px;
  }
  .controls {
    background: white;
    border: 1px solid #ddd;
    padding: 16px 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    border-radius: 6px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .controls button {
    background: #c41a1a;
    color: white;
    border: none;
    padding: 10px 24px;
    font-size: 14px;
    font-weight: bold;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
  }
  .controls button:hover { background: #a01010; }
  .controls span {
    font-size: 12px;
    color: #888;
    letter-spacing: 1px;
  }

  /* ── 4x6 LABEL ─────────────────────────── */
  .label {
    width: 4in;
    height: 6in;
    background: white;
    border: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.15);
  }

  /* Top red stripe */
  .label-stripe { height: 6px; background: #c41a1a; }

  /* Logo bar */
  .label-logo-bar {
    background: #080808;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .label-logo-bar img {
    height: 36px;
    width: auto;
  }
  .label-lot {
    font-family: Arial, sans-serif;
    font-weight: 900;
    font-size: 28px;
    color: #c41a1a;
    letter-spacing: -1px;
    line-height: 1;
  }
  .label-lot-label {
    font-size: 8px;
    letter-spacing: 3px;
    color: #888;
    text-transform: uppercase;
    text-align: right;
    margin-bottom: 2px;
  }

  /* Divider */
  .label-divider { height: 2px; background: #c41a1a; }

  /* Title area */
  .label-title-area {
    padding: 14px 16px 10px;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .label-eyebrow {
    font-size: 8px;
    letter-spacing: 4px;
    color: #aaa;
    text-transform: uppercase;
  }
  .label-title {
    font-size: 18px;
    font-weight: 900;
    color: #111;
    line-height: 1.25;
    letter-spacing: -0.3px;
  }
  .label-vehicle {
    font-size: 11px;
    color: #555;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Specs row */
  .label-specs {
    display: flex;
    gap: 0;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
    margin: 0 16px;
  }
  .label-spec {
    flex: 1;
    padding: 8px 10px;
    border-right: 1px solid #eee;
    text-align: center;
  }
  .label-spec:last-child { border-right: none; }
  .label-spec-label {
    font-size: 7px;
    letter-spacing: 3px;
    color: #aaa;
    text-transform: uppercase;
    margin-bottom: 3px;
  }
  .label-spec-val {
    font-size: 13px;
    font-weight: 700;
    color: #111;
  }

  /* QR + footer */
  .label-bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 16px;
    gap: 12px;
  }
  #qrcode canvas, #qrcode img {
    width: 90px !important;
    height: 90px !important;
  }
  .label-footer-text {
    flex: 1;
    text-align: right;
  }
  .label-footer-url {
    font-size: 7px;
    color: #aaa;
    word-break: break-all;
    margin-bottom: 6px;
    letter-spacing: 0.3px;
  }
  .label-footer-brand {
    font-size: 9px;
    font-weight: 900;
    letter-spacing: 4px;
    color: #c41a1a;
    text-transform: uppercase;
  }
  .label-footer-sub {
    font-size: 7px;
    letter-spacing: 3px;
    color: #aaa;
    text-transform: uppercase;
    margin-top: 2px;
  }

  /* Bottom red stripe */
  .label-bottom-stripe { height: 6px; background: #080808; }

  /* Print styles */
  @media print {
    body { background: white; padding: 0; }
    .controls { display: none; }
    .label {
      border: none;
      box-shadow: none;
      width: 4in;
      height: 6in;
    }
    @page {
      size: 4in 6in;
      margin: 0;
    }
  }
</style>
</head>

<script>
  // Read URL params passed from main app
  const params = new URLSearchParams(window.location.search);
  const title    = params.get('title')   || 'Unknown Part';
  const lot      = params.get('lot')     || '—';
  const ebayUrl  = params.get('url')     || '';
  const year     = params.get('year')    || '';
  const make     = params.get('make')    || '';
  const model    = params.get('model')   || '';
  const length   = params.get('l')       || '—';
  const width    = params.get('w')       || '—';
  const height   = params.get('h')       || '—';
  const weight   = params.get('wt')      || '—';

  // Populate label
  document.getElementById('lotDisplay').textContent    = lot;
  document.getElementById('titleDisplay').textContent  = title;
  document.getElementById('urlDisplay').textContent    = ebayUrl || 'Pending eBay post';
  document.getElementById('specL').textContent  = length !== '—' ? length + '"' : '—';
  document.getElementById('specW').textContent  = width  !== '—' ? width  + '"' : '—';
  document.getElementById('specH').textContent  = height !== '—' ? height + '"' : '—';
  document.getElementById('specWt').textContent = weight !== '—' ? weight + ' lb' : '—';

  const vehicle = [year, make, model].filter(Boolean).join(' ');
  document.getElementById('vehicleDisplay').textContent = vehicle || '';

  document.getElementById('controlInfo').textContent =
    'Lot #' + lot + ' · ' + title.substring(0, 40);

  // Generate QR code
  if (ebayUrl) {
    new QRCode(document.getElementById('qrcode'), {
      text: ebayUrl,
      width: 90,
      height: 90,
      colorDark: '#080808',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.M
    });
  } else {
    document.getElementById('qrcode').innerHTML =
      '<div style="width:90px;height:90px;background:#f0f0f0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;text-align:center">QR after<br>eBay post</div>';
  }
</script>
